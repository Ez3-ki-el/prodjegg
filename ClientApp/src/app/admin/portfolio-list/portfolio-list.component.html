<div class="list-page">
  <div class="page-header">
    <h2>Portfolio</h2>
    <button class="btn btn-primary" routerLink="/admin/portfolio/new">
      <iconify-icon icon="bx:plus"></iconify-icon> Ajouter un projet
    </button>
  </div>

  <div class="loading" *ngIf="loading">Chargement...</div>

  <table class="data-table" *ngIf="!loading && items.length > 0">
    <thead>
      <tr>
        <th>Image</th>
        <th>Titre</th>
        <th>Catégorie</th>
        <th>Ordre</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td><img [src]="item.imagePath" alt="{{ item.title }}" class="portfolio-thumbnail" /></td>
        <td class="project-title">{{ item.title }}</td>
        <td><span class="category-badge">{{ item.category }}</span></td>
        <td><span class="order-badge">{{ item.order }}</span></td>
        <td class="actions">
          <button class="btn-icon" [routerLink]="['/admin/portfolio/edit', item.id]" title="Modifier">
            <iconify-icon icon="bxs:edit"></iconify-icon>
          </button>
          <button class="btn-icon delete" (click)="deleteItem(item.id)" title="Supprimer">
            <iconify-icon icon="bx:trash"></iconify-icon>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="empty-state" *ngIf="!loading && items.length === 0">
    <iconify-icon icon="bx:images"></iconify-icon>
    <p>Aucun projet trouvé</p>
    <button class="btn btn-primary" routerLink="/admin/portfolio/new">Ajouter le premier projet</button>
  </div>
</div>
