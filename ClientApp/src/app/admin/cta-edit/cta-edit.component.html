<div class="edit-page">
  <h2>Éditer Call-to-Action Section</h2>
  
  <form [formGroup]="ctaForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Titre</label>
      <input type="text" formControlName="title" class="form-control" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" class="form-control" rows="4"></textarea>
    </div>

    <div class="form-group">
      <app-image-upload
        [currentImage]="ctaForm.get('imagePath')?.value"
        folder="cta"
        label="Image de la section CTA"
        (imageUploaded)="onImageUploaded($event)">
      </app-image-upload>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control" />
      </div>

      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="tel" formControlName="phoneNumber" class="form-control" />
      </div>
    </div>

    <div class="message success" *ngIf="message">{{ message }}</div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading || ctaForm.invalid">
        <span *ngIf="!loading">Enregistrer</span>
        <span *ngIf="loading">Enregistrement...</span>
      </button>
      <button type="button" class="btn btn-secondary" routerLink="/admin/dashboard">Annuler</button>
    </div>
  </form>
</div>
