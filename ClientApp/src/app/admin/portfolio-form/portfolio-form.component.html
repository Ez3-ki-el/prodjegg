<div class="edit-page">
  <h2>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un projet portfolio</h2>

  <form [formGroup]="portfolioForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Titre du projet</label>
      <input type="text" formControlName="title" class="form-control" placeholder="Ex: Site Web E-commerce" />
    </div>

    <div class="form-group">
      <app-image-upload [currentImage]="portfolioForm.get('imagePath')?.value" folder="portfolio"
        label="Image du projet" (imageUploaded)="onImageUploaded($event)">
      </app-image-upload>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie</label>
        <select formControlName="category" class="form-control">
          <option value="">-- Sélectionner --</option>
          <option value="Web Design">Web Design</option>
          <option value="Video Editing">Video Editing</option>
          <option value="Motion Graphics">Motion Graphics</option>
          <option value="Photography">Photography</option>
          <option value="Branding">Branding</option>
        </select>
      </div>

      <div class="form-group">
        <label>Ordre d'affichage</label>
        <input type="number" formControlName="order" class="form-control" />
      </div>
    </div>

    <div class="form-group">
      <label>Lien du projet</label>
      <input type="url" formControlName="projectUrl" class="form-control" placeholder="https://www.exemple.com" />
      <small>Optionnel — L'image sera cliquable. Pour Instagram (reel/post), colle l'URL du post:
        https://www.instagram.com/reel/... ou /p/...</small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading || portfolioForm.invalid">
        <span *ngIf="!loading">{{ isEditMode ? 'Mettre à jour' : 'Créer' }}</span>
        <span *ngIf="loading">Enregistrement...</span>
      </button>
      <button type="button" class="btn btn-secondary" routerLink="/admin/portfolio">Annuler</button>
    </div>
  </form>
</div>
