<div class="edit-page">
  <h2>Éditer About Section</h2>
  <p class="subtitle">Modifiez les informations de la section about</p>

  <form [formGroup]="aboutForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Titre</label>
      <input type="text" formControlName="title" class="form-control" />
    </div>

    <div class="form-group">
      <label>Sous-titre</label>
      <input type="text" formControlName="subtitle" class="form-control" />
    </div>

    <div class="form-group">
      <label>Paragraphe 1</label>
      <textarea formControlName="paragraph1" class="form-control" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Paragraphe 2</label>
      <textarea formControlName="paragraph2" class="form-control" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Paragraphe 3</label>
      <textarea formControlName="paragraph3" class="form-control" rows="4"></textarea>
    </div>

    <div class="message success" *ngIf="message">{{ message }}</div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading || aboutForm.invalid">
        <span *ngIf="!loading">Enregistrer</span>
        <span *ngIf="loading">Enregistrement...</span>
      </button>
      <button type="button" class="btn btn-secondary" routerLink="/admin/dashboard">Annuler</button>
    </div>
  </form>
</div>
